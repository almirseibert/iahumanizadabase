# Ambiente de desenvolvimento local: PostgreSQL + Redis
# Uso: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iah
      POSTGRES_PASSWORD: iah_dev_password
      POSTGRES_DB: iahumanizada
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iah"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # noeviction é requisito do BullMQ (jobs nunca podem ser descartados pelo Redis)
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
